<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>N-RPG — Arena Combat Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a; color: #e4e4e4;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      width: 100vw; height: 100svh; height: 100dvh; height: 100vh;
    }
    .container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    .menu-panel {
      width: 100%;
      max-height: 45vh;
      min-height: 160px;
      background: rgba(255,255,255,0.04);
      border-bottom: 2px solid #4a4a6a;
      padding: 10px 14px; display: flex; flex-direction: column;
      gap: 8px; z-index: 10; overflow-y: auto; flex-shrink: 0;
    }
    .menu-panel.hidden { display: none !important; }
    .menu-panel h3 {
      color: #ffd700; text-align: center; font-size: 0.85em;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .carousel-nav {
      display: flex; justify-content: center; gap: 12px; align-items: center;
    }
    .carousel-btn {
      min-width: 44px; min-height: 44px; width: 44px; height: 44px;
      border: 2px solid #ffd700; border-radius: 50%;
      background: rgba(255,215,0,0.2); color: #ffd700;
      font-size: 1.5em; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; touch-action: manipulation;
      box-shadow: 0 0 8px rgba(255,215,0,0.3);
    }
    .carousel-btn:hover, .carousel-btn:active {
      background: rgba(255,215,0,0.45); transform: scale(1.1);
    }
    .carousel-title { color: #ffd700; font-weight: bold; }
    .class-card {
      border: 2px solid #4a4a6a;
      background: rgba(255,255,255,0.03); padding: 10px;
      flex: 1; display: flex; flex-direction: column;
      justify-content: flex-start; align-items: flex-end; gap: 4px;
      transition: border-color 0.3s;
    }
    .class-card.selected { border-color: #ffd700; }
    .class-icon { font-size: 2.2em; line-height: 1; }
    .class-name { font-size: 1.05em; font-weight: bold; color: #ffd700; text-transform: uppercase; }
    .class-stats { display: flex; gap: 4px; font-size: 0.68em; }
    .class-stats .stat { padding: 2px 6px; font-weight: bold; }
    .class-stats .stat.hp { background: rgba(231,76,60,0.3); }
    .class-stats .stat.atk { background: rgba(52,152,219,0.3); }
    .class-stats .stat.spd { background: rgba(155,89,182,0.3); }
      .class-skills { font-size: 0.7em; text-align: left; line-height: 1.4; color: #aaa; }
        .class-skills .s { color: #ffd700; font-weight: bold; }
         .class-controls { font-size: 0.5em; text-align: center; line-height: 1.6; color: #999; }
         .class-controls .ctrl-key { color: #ffd700; font-weight: bold; }
         .controls-section { display: block; font-size: 0.9em; text-align: left; line-height: 1.6; color: #ddd; padding: 8px 4px; border-top: 1px solid #4a4a6a; margin-top: 2px; }
         .controls-section .ctrl-line { margin-bottom: 4px; }
         .controls-section .ctrl-label { color: #ffd700; font-weight: bold; }
         .controls-section .s { color: #ffd700; font-weight: bold; }
    .btn-start {
      padding: 12px 30px; border: 2px solid #ffd700; border-radius: 8px;
      background: rgba(255,215,0,0.15); color: #ffd700;
      font-size: 1em; font-weight: bold; cursor: pointer;
      transition: all 0.3s; text-transform: uppercase; width: 100%;
    }
    .btn-start:hover { background: rgba(255,215,0,0.35); transform: translateY(-2px); }
    .btn-fullscreen {
      padding: 8px 16px; border: 2px solid #ffd700; border-radius: 8px;
      background: rgba(255,215,0,0.1); color: #ffd700;
      font-size: 0.8em; font-weight: bold; cursor: pointer;
      transition: all 0.3s; text-transform: uppercase; width: 100%;
      margin-top: 4px;
    }
    .btn-fullscreen:hover { background: rgba(255,215,0,0.25); }
    .btn-quit {
      position: absolute; top: 8px; right: 8px; z-index: 20;
      padding: 6px 12px; border: 2px solid #e74c3c; border-radius: 8px;
      background: rgba(231,76,60,0.15); color: #e74c3c;
      font-size: 0.7em; font-weight: bold; cursor: pointer;
      text-transform: uppercase; pointer-events: auto;
      display: none;
    }
    .btn-quit:hover { background: rgba(231,76,60,0.3); }
    .main-area {
      flex: 1; width: 100%; height: 100%; position: relative;
      overflow: hidden; display: flex; flex-direction: column;
      min-width: 0; min-height: 0;
    }
    .hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 16px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .hud.visible { opacity: 1; }
    .hud-left, .hud-right { pointer-events: auto; }
    .hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .hp-container {
      background: rgba(0,0,0,0.6); border: 2px solid #4a4a6a;
      border-radius: 10px; padding: 8px 12px; min-width: 200px;
    }
    .hp-text { font-size: 0.78em; color: #ccc; margin-bottom: 4px; }
    .hp-bar-bg { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
    .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #2ecc71); border-radius: 6px; transition: width 0.3s; }
    .score-display {
      background: rgba(0,0,0,0.6); border: 2px solid #ffd700;
      border-radius: 10px; padding: 8px 14px; text-align: right;
    }
    .score-display .kills { font-size: 0.9em; color: #ffd700; font-weight: bold; }
    .score-display .level { font-size: 0.75em; color: #aaa; }
    .skill-indicator {
      background: rgba(0,0,0,0.6); border: 2px solid #4a4a6a;
      border-radius: 10px; padding: 8px 14px; font-size: 0.72em; color: #aaa;
    }
    #game-canvas {
      width: 100%; height: 100%; display: block; cursor: crosshair;
      image-rendering: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .compact-log {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      width: 340px; max-width: 90vw; background: rgba(0,0,0,0.7);
      border: 1px solid #4a4a6a; border-radius: 8px; padding: 6px 10px;
      z-index: 7; cursor: default; transition: all 0.2s; opacity: 0;
    }
    .compact-log.visible { opacity: 1; }
    .compact-log:hover, .compact-log:active {
      background: rgba(0,0,0,0.85); border-color: #ffd700;
    }
    .log-content {
      font-size: 0.78em; text-align: center; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; pointer-events: none;
    }
    .log-content.player { color: #3498db; }
    .log-content.enemy { color: #e74c3c; }
    .log-content.crit { color: #ffd700; }
    .log-content.reward { color: #2ecc71; }
    .log-content.death { color: #ff4444; }
    .log-content.move { color: #95a5a6; }
    .log-tooltip {
      position: absolute; bottom: 110%; left: 0; right: 0;
      background: rgba(10,10,30,0.95); border: 1px solid #ffd700;
      border-radius: 8px; padding: 8px; max-height: 180px;
      overflow-y: auto; display: none; font-size: 0.72em; line-height: 1.5;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    .log-tooltip.show { display: block; }
    .log-tooltip .log-entry { padding: 4px 6px; margin-bottom: 3px; border-radius: 4px; background: rgba(255,255,255,0.03); }
    .log-tooltip .log-entry.player { border-left: 3px solid #3498db; }
    .log-tooltip .log-entry.enemy { border-left: 3px solid #e74c3c; }
    .log-tooltip .log-entry.crit { border-left: 3px solid #ffd700; }
    .log-tooltip .log-entry.reward { border-left: 3px solid #2ecc71; }
    .log-tooltip .log-entry.death { border-left: 3px solid #ff4444; }
    .log-tooltip .log-entry.move { border-left: 3px solid #95a5a6; }
    .cooldown-ring {
      position: absolute; bottom: 60px; right: 20px; z-index: 6;
      width: 56px; height: 56px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .cooldown-ring.visible { opacity: 1; }
    .cooldown-ring svg { width: 100%; height: 100%; }
    .cooldown-ring circle {
      fill: none; stroke: #ffd700; stroke-width: 3;
      stroke-dasharray: 150.8; stroke-dashoffset: 0;
      transform: rotate(-90deg); transform-origin: center;
      transition: stroke-dashoffset 0.1s linear;
    }
    .cooldown-ring .cd-text {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #ffd700; font-size: 0.8em; font-weight: bold;
    }
    .death-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 20; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 15px;
    }
    .death-overlay.show { display: flex; }
    .death-overlay h2 { color: #e74c3c; font-size: 2.5em; }
    .death-overlay p { color: #aaa; font-size: 1.1em; }
    .death-overlay .btn-restart {
      padding: 14px 50px; border: 2px solid #ffd700; border-radius: 10px;
      background: rgba(255,215,0,0.15); color: #ffd700; font-size: 1.1em;
      font-weight: bold; cursor: pointer; transition: all 0.3s;
    }
    .death-overlay .btn-restart:hover { background: rgba(255,215,0,0.35); transform: scale(1.05); }
    .kill-popup {
      position: absolute; z-index: 8; font-size: 1.4em; font-weight: bold;
      color: #ffd700; pointer-events: none; animation: killFloat 1s ease-out forwards;
    }
    @keyframes killFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }
    .boss-warning {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 9; font-size: 1.8em; font-weight: bold; color: #e74c3c;
      text-shadow: 0 0 20px #e74c3c, 0 0 40px #c0392b;
      pointer-events: none; animation: bossPulse 0.5s ease-out forwards; white-space: nowrap;
    }
    @keyframes bossPulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
      40% { transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.0) translateY(-30px); }
    }
    .env-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 9; font-size: 1.5em; font-weight: bold; color: #ffd700;
      text-shadow: 0 0 20px #ffd700, 0 0 40px #f39c12;
      pointer-events: none; animation: envBanner 1.5s ease-out forwards; white-space: nowrap;
    }
    @keyframes envBanner {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      35% { transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.0); }
    }

    /* walking indicator */
    .walk-indicator {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 6; font-size: 0.85em; color: #95a5a6;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 6px;
    }
    .walk-indicator.visible { opacity: 1; }

    @media (orientation: landscape) and (max-height: 500px) {
      .menu-panel {
        max-height: 55vh;
        min-height: 120px;
        padding: 6px 10px;
        gap: 6px;
      }
      .class-icon { font-size: 1.6em; }
      .class-name { font-size: 0.8em; }
      .class-stats { font-size: 0.6em; }
      .controls-section { font-size: 0.75em; }
      .btn-start { padding: 8px 16px; font-size: 0.85em; }
      .carousel-btn { min-width: 36px; min-height: 36px; font-size: 1.3em; }
    }

    @media (min-width: 768px) {
      .container { flex-direction: row; }
      .menu-panel {
        width: 260px;
        min-width: 260px;
        max-height: none;
        min-height: auto;
        border-bottom: none;
        border-right: 2px solid #4a4a6a;
        padding: 14px 16px;
        gap: 12px;
      }
      .main-area { flex: 1; }
      .carousel-btn { min-width: 44px; min-height: 44px; font-size: 1.5em; }
      .class-icon { font-size: 2em; }
      .class-name { font-size: 1em; }
      .class-stats { font-size: 0.68em; }
      .controls-section { font-size: 0.85em; }
      .btn-start { padding: 12px 30px; font-size: 1em; }
      .hud { padding: 12px 16px; }
      .hp-container { padding: 8px 12px; min-width: 200px; }
      .score-display { padding: 8px 14px; }
      .skill-indicator { padding: 8px 14px; font-size: 0.72em; }
      .hp-text { font-size: 0.78em; }
      .score-display .kills { font-size: 0.9em; }
      .score-display .level { font-size: 0.75em; }
      .cooldown-ring { bottom: 60px; right: 20px; width: 56px; height: 56px; }
      .compact-log { width: 340px; bottom: 12px; padding: 6px 10px; }
      .compact-log .log-content { font-size: 0.78em; }
      .walk-indicator { bottom: 80px; font-size: 0.85em; }
    }

    @media (min-width: 1024px) {
      .menu-panel { width: 280px; min-width: 280px; padding: 16px 18px; }
      .hud { padding: 14px 20px; }
      .hp-container { padding: 10px 14px; min-width: 220px; }
      .score-display { padding: 10px 16px; }
      .skill-indicator { padding: 10px 16px; font-size: 0.78em; }
      .compact-log { width: 400px; bottom: 16px; }
      .walk-indicator { bottom: 90px; font-size: 0.9em; }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="menu-panel" id="menu-panel">
      <div class="carousel-nav">
        <button class="carousel-btn" onclick="prevClass()">◀</button>
        <span class="carousel-title" id="current-class-name">Warrior</span>
        <button class="carousel-btn" onclick="nextClass()">▶</button>
      </div>
      <div class="class-card selected" id="class-card">
         <div class="class-icon" id="class-icon">⚔️</div>
         <div class="class-name" id="class-card-name">Warrior</div>
         <div class="class-stats">
           <span class="stat hp" id="stat-hp">HP: 120</span>
           <span class="stat atk" id="stat-atk">ATK: 22</span>
           <span class="stat spd" id="stat-spd">SPD: 8</span>
         </div>
         <div class="controls-section" id="controls-section"></div>
       </div>
      <button class="btn-start" id="btn-start" onclick="startGame()">🎮 START GAME</button>
      <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
    </div>

    <div class="main-area" id="main-area">
      <canvas id="game-canvas" style="display:none;"></canvas>
      <div class="hud" id="hud">
        <div class="hud-left">
          <div class="hp-container">
            <div class="hp-text" id="hp-text">HP: 100 / 100</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-bar" style="width:100%"></div></div>
          </div>
          <div class="skill-indicator" style="margin-top:6px;">
            <span id="s1-label">🛡️ S1: Shield Bash</span> &nbsp;|&nbsp;
            <span id="s2-label">⚔️ S2: Sword Slash</span>
          </div>
        </div>
        <div class="hud-right">
          <div class="score-display">
            <div class="kills">💀 Kills: <span id="kill-count">0</span></div>
            <div class="level">📊 Wave: <span id="wave-count">1</span> | Env: <span id="env-name">Forest</span></div>
          </div>
        </div>
      </div>
      <div class="cooldown-ring" id="cd-ring">
        <svg viewBox="0 0 60 60"><circle id="cd-circle" cx="30" cy="30" r="26" /></svg>
        <div class="cd-text" id="cd-text"></div>
      </div>
      <div class="walk-indicator" id="walk-indicator">🚶 Walking...</div>
      <div class="compact-log" id="compact-log">
        <div class="log-content" id="log-display">Waiting for action...</div>
        <div class="log-tooltip" id="log-tooltip"></div>
      </div>
      <div class="death-overlay" id="death-overlay">
        <h2>💀 YOU DIED</h2>
        <p>Kills: <span id="death-kills">0</span> | Wave: <span id="death-wave">1</span></p>
        <button class="btn-restart" onclick="restartGame()">🔄 RESPAWN</button>
      </div>
    </div>
  </div>

  <script>
    const GAME_W = 800, GAME_H = 600;
    const DEPTH_GROUND_TOP = 0.55; // top limit of depth ground zone
    const DEPTH_GROUND_BOTTOM = 1.0; // bottom of screen
    let viewScale = 1, viewOX = 0, viewOY = 0;
    const DEAD_BODY_LIFETIME = 2000;
    const MOVE_SPEED = 2.5;
    const MOVE_STOP_DIST = 3;
    const GROUND_TOLERANCE = 30;

    const CLASS_DATA = {
      warrior: { name:'Warrior', icon:'⚔️', hp:120, atk:22, spd:8, color:'#c0392b', accent:'#e74c3c', s1Name:'Shield Bash', s1Color:'#d4af37', s2Name:'Sword Slash', s2Color:'#ffd700' },
      mage: { name:'Mage', icon:'🔮', hp:80, atk:18, spd:14, color:'#2980b9', accent:'#3498db', s1Name:'Magic Bolt', s1Color:'#3498db', s2Name:'Fireball', s2Color:'#e67e22' },
      archer: { name:'Archer', icon:'🏹', hp:70, atk:24, spd:18, color:'#27ae60', accent:'#2ecc71', s1Name:'Quick Shot', s1Color:'#f1c40f', s2Name:'Arrow Barrage', s2Color:'#e74c3c' },
      magicgladiator: { name:'Magic Gladiator', icon:'✨', hp:140, atk:26, spd:6, color:'#8e44ad', accent:'#9b59b6', s1Name:'Dual Slash', s1Color:'#e74c3c', s2Name:'Cross Slash', s2Color:'#ffd700' }
    };
    const ENEMY_TYPES = [
      { name:'Slime', icon:'🟢', hp:30, atk:5, color:'#2ecc71', speed:0.4, size:20 },
      { name:'Goblin', icon:'👺', hp:45, atk:8, color:'#27ae60', speed:0.7, size:22 },
      { name:'Skeleton', icon:'💀', hp:55, atk:10, color:'#dfe6e9', speed:0.5, size:24 },
      { name:'Orc', icon:'👹', hp:80, atk:14, color:'#6b8e23', speed:0.35, size:28 },
      { name:'Ghost', icon:'👻', hp:40, atk:12, color:'#dfe6e9', speed:0.9, size:22 },
      { name:'Demon', icon:'🔥', hp:100, atk:18, color:'#e74c3c', speed:0.55, size:26 },
      { name:'Dragon', icon:'🐉', hp:150, atk:22, color:'#e67e22', speed:0.3, size:32 },
      { name:'Lich', icon:'🧙', hp:120, atk:20, color:'#8e44ad', speed:0.45, size:26 },
    ];
    const ENV_LIST = ['forest','castle','volcano','beach','tundra','swamp'];
    const ENV_DISPLAY = { forest:'Forest', castle:'Castle', volcano:'Volcano', beach:'Beach', tundra:'Tundra', swamp:'Swamp' };
    const ENV_CONFIG = {
      forest: { skyTop:'#0a1628', skyMid:'#1a3a2a', skyBot:'#0d2015', ground:'#0d2015', groundY:0.82 },
      castle: { skyTop:'#2a2a3a', skyMid:'#3a3a4a', skyBot:'#2a2a3a', ground:'#1a1a2a', groundY:0.78 },
      volcano:{ skyTop:'#2a0a0a', skyMid:'#4a1a0a', skyBot:'#1a0a0a', ground:'#1a0a0a', groundY:0.85 },
      beach:  { skyTop:'#1a3a6a', skyMid:'#3a7aaa', skyBot:'#5a9aca', ground:'#d4a574', groundY:0.80 },
      tundra: { skyTop:'#0a1a3a', skyMid:'#1a3a6a', skyBot:'#e8f0f8', ground:'#c0d8e8', groundY:0.88 },
      swamp:  { skyTop:'#0a1a0a', skyMid:'#1a2a1a', skyBot:'#0a150a', ground:'#1a2a1a', groundY:0.78 }
    };

    let selectedClass = 'warrior', currentCarouselIndex = 0;
    const classes = ['warrior','mage','archer','magicgladiator'];
    let gameState = 'MENU';
    let canvas, ctx, W, H;
    let player = {}, enemies = [], projectiles = [], particles = [], floatingTexts = [], bgParticles = [];
    let kills = 0, wave = 1, gameActive = false, killsSinceLastWave = 0;
    let s2Cooldown = 0, s2MaxCooldown = 1000, lastTime = 0, enemySpawnTimer = 0, enemySpawnInterval = 2000;
    let recentLogs = [], MAX_LOGS = 12;
    let mouseX = GAME_W/2, mouseY = GAME_H/2;
    let selectedEnv = 'forest';
    let touchActive = false, touchLongPressTimer = null;
    let canvasRectCSS = { left: 0, top: 0, width: 0, height: 0 };
    let moveMarker = null;

    // Foliage system — belongs to BACKGROUND only
    // Ground decoration is generated in drawBiomeGroundDecoration() each frame
    let globalTime = 0;

    function getArmAnim(animTimer) {
      if (animTimer <= 0) return 0;
      const t = 1 - animTimer / 15;
      return Math.sin(t * Math.PI) * -0.40;
    }

    function getGroundY() {
      const envConfig = ENV_CONFIG[selectedEnv] || ENV_CONFIG.forest;
      return GAME_H * envConfig.groundY;
    }

    function updateLayout() {
      const parent = canvas.parentElement;
      const cw = parent.clientWidth;
      const ch = parent.clientHeight;
      if (cw <= 0 || ch <= 0) return;
      W = cw; H = ch;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = cw * dpr;
      canvas.height = ch * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const sx = W / GAME_W, sy = H / GAME_H;
      viewScale = Math.max(sx, sy);
      const scaledW = GAME_W * viewScale;
      const scaledH = GAME_H * viewScale;
      viewOX = (W - scaledW) / 2;
      viewOY = H - scaledH;
     const groundY = getGroundY();
      const depthTop = GAME_H * DEPTH_GROUND_TOP;
      if (player.alive) {
        player.y = Math.max(depthTop + 20, Math.min(player.y, GAME_H - 10));
      }
      for (let e of enemies) {
        if (e.alive) {
          e.y = Math.max(depthTop + e.size, Math.min(e.y, GAME_H - 10));
        }
      }
    }

    function resize() {
      updateLayout();
      if (gameState === 'MENU') drawMenuBackground();
    }

    function applyViewport() {
      ctx.translate(viewOX, viewOY);
      ctx.scale(viewScale, viewScale);
    }

    function refreshCanvasRect() {
      const rect = canvas.getBoundingClientRect();
      canvasRectCSS.left = rect.left;
      canvasRectCSS.top = rect.top;
      canvasRectCSS.width = rect.width;
      canvasRectCSS.height = rect.height;
    }

    function toGameCoords(clientX, clientY) {
      refreshCanvasRect();
      const canvasX = clientX - canvasRectCSS.left;
      const canvasY = clientY - canvasRectCSS.top;
      const gameX = (canvasX - viewOX) / viewScale;
      const gameY = (canvasY - viewOY) / viewScale;
      return { x: gameX, y: gameY };
    }

    function normalizeAngle(a) {
      while (a > Math.PI) a -= 2 * Math.PI;
      while (a < -Math.PI) a += 2 * Math.PI;
      return a;
    }

    function pointInSweepArc(originX, originY, dirAngle, halfAngle, innerR, outerR, px, py) {
      const dx = px - originX, dy = py - originY;
      const dist = Math.hypot(dx, dy);
      if (dist < innerR || dist > outerR) return false;
      const angleToP = normalizeAngle(Math.atan2(dy, dx));
      const angleDiff = normalizeAngle(angleToP - dirAngle);
      return Math.abs(angleDiff) <= halfAngle;
    }

    function circleOverlapsCrescentArc(ox, oy, dirAngle, travelDist, enemyX, enemyY, enemySize) {
      const arcCX = ox + Math.cos(dirAngle) * travelDist;
      const arcCY = oy + Math.sin(dirAngle) * travelDist;
      const edx = enemyX - arcCX, edy = enemyY - arcCY;
      const dist = Math.hypot(edx, edy);
      const cosDir = Math.cos(dirAngle), sinDir = Math.sin(dirAngle);
      const tanX = -sinDir, tanY = cosDir;
      const tangentDist = Math.abs(edx * tanX + edy * tanY);
      const axialDist = Math.abs(edx * cosDir + edy * sinDir);
      const arcRadius = 60;
      const crescentWidth = 160;
      const crescentDepth = 18;
      const halfWidth = crescentWidth / 2;
      if (dist > arcRadius + enemySize + 10) return false;
      if (tangentDist > halfWidth + enemySize) return false;
      if (axialDist > crescentDepth + enemySize + 8) return false;
      return true;
    }

    function handleLeftClick(cx, cy) {
      const groundY = getGroundY();
      const onGround = cy >= groundY - GROUND_TOLERANCE;
      let clickedEnemy = null;
      for (let e of enemies) {
        if (!e.alive) continue;
        const dx = cx - e.x, dy = cy - e.y;
        const dist = Math.hypot(dx, dy);
        if (dist < e.size + 15) {
          clickedEnemy = e;
          break;
        }
      }

      if (!onGround) {
        addLog('⚡ Clicked on sky — attacking!', 'move');
        doSkill1(cx, cy);
        return;
      }

      if (clickedEnemy) {
        addLog(`⚔️ Clicked ${clickedEnemy.name} — attacking!`, 'player');
        doSkill1(cx, cy);
        return;
      }

      stopWalking();
      player.moveTargetX = cx;
      player.moveTargetY = cy;
      player.isMoving = true;

      player.moveTargetX = Math.max(30, Math.min(GAME_W - 30, player.moveTargetX));
      player.moveTargetY = Math.max(groundY - 50, Math.min(GAME_H - 10, player.moveTargetY));

      moveMarker = { x: cx, y: cy, life: 30, maxLife: 30 };
      addLog(`🚶 Walking to (${Math.round(cx)}, ${Math.round(cy)})`, 'move');
    }

    function stopWalking() {
      if (player.isMoving) {
        player.isMoving = false;
        player.moveTargetX = 0;
        player.moveTargetY = 0;
        moveMarker = null;
        document.getElementById('walk-indicator').classList.remove('visible');
      }
    }

    function updatePlayerMovement(dt) {
      if (!player.isMoving) return;
      const dx = player.moveTargetX - player.x;
      const dy = player.moveTargetY - player.y;
      const dist = Math.hypot(dx, dy);

      if (dist <= MOVE_STOP_DIST) {
        player.x = player.moveTargetX;
        player.y = player.moveTargetY;
        stopWalking();
        return;
      }

      const moveAmt = MOVE_SPEED * dt;
      player.x += (dx / dist) * moveAmt;
      player.y += (dy / dist) * moveAmt;

      player.x = Math.max(20, Math.min(GAME_W - 20, player.x));
      const groundY = getGroundY();
      player.y = Math.max(groundY - 50, Math.min(GAME_H - 10, player.y));

      if (dx > 2) player.facing = 1;
      else if (dx < -2) player.facing = -1;
    }

    function drawMoveMarker() {
      if (!moveMarker || moveMarker.life <= 0) return;
      const progress = moveMarker.life / moveMarker.maxLife;
      ctx.globalAlpha = progress * 0.6;
      ctx.strokeStyle = '#95a5a6';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(moveMarker.x, moveMarker.y, 12 * progress, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      const s = 6 * progress;
      ctx.beginPath();
      ctx.moveTo(moveMarker.x - s, moveMarker.y - s);
      ctx.lineTo(moveMarker.x + s, moveMarker.y + s);
      ctx.moveTo(moveMarker.x + s, moveMarker.y - s);
      ctx.lineTo(moveMarker.x - s, moveMarker.y + s);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function  drawMenuBackground() {
      const env = ENV_CONFIG[selectedEnv];
      applyViewport();
      const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
      skyGrad.addColorStop(0, env.skyTop);
      skyGrad.addColorStop(0.5, env.skyMid);
      skyGrad.addColorStop(1, env.skyBot);
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      const gY = GAME_H * env.groundY;
      ctx.fillStyle = env.ground;
      ctx.fillRect(0, gY, GAME_W, GAME_H - gY);
      // Compact controls text
      ctx.fillStyle = 'rgba(255,215,0,0.2)';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎮 SELECT CLASS & PRESS START', GAME_W / 2, GAME_H / 2);
      ctx.fillStyle = 'rgba(200,200,200,0.15)';
      ctx.font = '11px sans-serif';
      const sk = SKILL_DESC[selectedClass];
      ctx.fillText(`S1: ${sk.s1.ctrl} → ${sk.s1.name} | S2: ${sk.s2.ctrl} → ${sk.s2.name} (1s CD)`, GAME_W / 2, GAME_H / 2 + 30);
      ctx.textBaseline = 'alphabetic';
      ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
    }

    function doSkill1(tx, ty) {

            type:'aoe_explosion', x:player.x, y:player.y-40, tx, ty,
            radius:130, life:25, maxLife:25, color:'#ffd700',
            damage:player.atk*3.0, critChance:0.25
          });
          spawnParticles(player.x, player.y, '#ffd700', 30, 8);
          addLog(cd.s2Name+' 💥💥💥 MASSIVE!');
          break;
      }
    }

    function dealDamage(enemy, baseDamage, critChance) {
      if (!enemy.alive) return;
      const isCrit = Math.random() < critChance;
      const damage = Math.round(baseDamage * (isCrit ? 2.0 : 1.0) * (0.9 + Math.random() * 0.2));
      enemy.hp -= damage;
      enemy.hitFlash = 8;
      floatingTexts.push({
        x: enemy.x+(Math.random()-0.5)*20, y: enemy.y-30,
        text: (isCrit?'💥 ':'')+damage,
        color: isCrit?'#ffd700':'#fff', life:40, maxLife:40, isCrit
      });
      if (enemy.hp <= 0) killEnemy(enemy);
    }

    function applyKnockback(enemy, dirAngle, distance) {
      if (!enemy.alive) return;
      enemy.x += Math.cos(dirAngle) * distance;
      enemy.y += Math.sin(dirAngle) * distance * 0.4;
      const groundY = getGroundY();
      enemy.x = Math.max(enemy.size, Math.min(GAME_W - enemy.size, enemy.x));
      enemy.y = Math.max(enemy.size, Math.min(groundY - enemy.size, enemy.y));
      spawnParticles(enemy.x, enemy.y, '#fff', 4, 3);
      spawnParticles(enemy.x, enemy.y, '#ffd700', 3, 2);
      floatingTexts.push({
        x: enemy.x + (Math.random()-0.5)*20,
        y: enemy.y - enemy.size - 15,
        text: '🔨', color: '#ffd700',
        life: 25, maxLife: 25, isCrit: false
      });
      if (enemy.attackTimer !== undefined) enemy.attackTimer = Math.max(enemy.attackTimer, 30);
    }

    function killEnemy(enemy) {
      enemy.alive = false;
      enemy.deathTime = Date.now();
      enemy.hp = 0;
      kills++;
      killsSinceLastWave++;
      document.getElementById('kill-count').textContent = kills;
      if (killsSinceLastWave >= 5) {
        killsSinceLastWave = 0;
        wave++;
        document.getElementById('wave-count').textContent = wave;
        if (wave % 5 === 0) {
          addLog(`📊 Wave ${wave}!`, 'reward');
          updateEnvironment();
          addLog('⚠️ BOSS SPAWNED!', 'death');
          showBossWarning();
          spawnBoss();
        } else {
          addLog(`📊 Wave ${wave}!`, 'reward');
          updateEnvironment();
          spawnEnemy();
        }
      } else {
        setTimeout(() => { if (gameActive) spawnEnemy(); }, 300);
      }
      showKillPopup(enemy.x, enemy.y);
      spawnParticles(enemy.x, enemy.y, enemy.color, 15, 5);
      spawnParticles(enemy.x, enemy.y, '#ffd700', 8, 3);
      addLog(`💀 ${enemy.name} defeated!`, 'reward');
    }

    function spawnBoss() {
      const scale = 1 + (wave - 1) * 0.15;
      const envConfig = ENV_CONFIG[selectedEnv] || ENV_CONFIG.forest;
      const groundY = GAME_H * envConfig.groundY;
      const boss = {
        name:'BOSS', icon:'👑',
        hp: Math.round(250*scale), maxHp: Math.round(250*scale),
        atk: Math.round(18*scale), speed: 0.2, size: 48, color:'#8e44ad'
      };
      const sx = GAME_W * 0.15 + Math.random() * GAME_W * 0.7;
      enemies.push({
        ...boss, x:sx, y:groundY-48, alive:true, hitFlash:0,
        attackTimer:0, attackCooldown:120
      });
    }

    function getSafeSpawnPosition() {
      const envConfig = ENV_CONFIG[selectedEnv] || ENV_CONFIG.forest;
      const groundY = GAME_H * envConfig.groundY;
      const minDim = Math.min(GAME_W, GAME_H);
      const aspectRatio = GAME_W / GAME_H;
      const safeMargin = Math.max(40, minDim * 0.12);
      const minDist = minDim * 0.25;
      let attempts = 0;
      while (attempts < 40) {
        attempts++;
        let sx, sy;
        if (aspectRatio < 0.6) {
          const edge = Math.random();
          if (edge < 0.5) {
            sx = safeMargin + Math.random()*(GAME_W - safeMargin*2);
            sy = -30 - Math.random()*40;
          } else {
            sx = safeMargin + Math.random()*(GAME_W - safeMargin*2);
            sy = GAME_H + 30 + Math.random()*40;
          }
        } else {
          const roll = Math.random();
          if (roll < 0.45) {
            sx = safeMargin + Math.random()*(GAME_W - safeMargin*2);
            sy = -30 - Math.random()*40;
          } else if (roll < 0.7) {
            sx = -40 - Math.random()*50;
            sy = safeMargin + Math.random()*(GAME_H - safeMargin*2);
          } else {
            sx = GAME_W + 40 + Math.random()*50;
            sy = safeMargin + Math.random()*(GAME_H - safeMargin*2);
          }
        }
        const dx = sx - player.x, dy = sy - player.y, dist = Math.hypot(dx, dy);
        if (dist > minDist) return { x: sx, y: sy };
        const angle = Math.atan2(dy, dx);
        sx += Math.cos(angle)*(minDist+30);
        sy += Math.sin(angle)*(minDist+30);
      }
      return {
        x: player.x + (Math.random()<0.5?-1:1)*(minDist+50),
        y: Math.min(player.y - minDist*0.6, groundY-50)
      };
    }

    function spawnEnemy() {
      const scale = 1 + (wave - 1) * 0.15;
      const envConfig = ENV_CONFIG[selectedEnv] || ENV_CONFIG.forest;
      const groundY = GAME_H * envConfig.groundY;
      const available = ENEMY_TYPES.slice(0, Math.min(2 + Math.floor(wave/2), ENEMY_TYPES.length));
      const type = available[Math.floor(Math.random() * available.length)];
      const pos = getSafeSpawnPosition();
      enemies.push({
        x: pos.x, y: pos.y,
        hp: Math.round(type.hp*scale), maxHp: Math.round(type.hp*scale),
        atk: Math.round(type.atk*scale),
        speed: type.speed*(0.8+Math.random()*0.4),
        color: type.color, name: type.name, icon: type.icon, size: type.size,
        alive: true, hitFlash: 0, attackTimer: 0,
        attackCooldown: 60+Math.floor(Math.random()*40)
      });
    }

    // ═══════════════════════════════════════════════════════
    // GAME LOOP — rendering order is strictly:
    //   Background (sky + ground + bg particles + foliage)
    //   → Foreground layer: monsters → player → spells
    //   → Particles & floating texts (on top of everything)
    // ═══════════════════════════════════════════════════════
    function gameLoop(time) {
      if (gameState === 'PLAYING') {
        const dt = lastTime ? Math.min((time - lastTime) / 16.67, 3) : 1;
        lastTime = time;
        globalTime += dt * 0.016;

        applyViewport();
        ctx.clearRect(0, 0, GAME_W, GAME_H);

        // ═══ LAYER 1 — BACKGROUND (sky + horizon + depth ground) ═══
        drawEnvironment();
        drawBackgroundParticles(dt);

        // ═══ LAYER 2 — GROUND DECORATION (biome-specific, on ground layer) ═══
        drawBiomeGroundDecoration(getGroundY());
        drawMoveMarker();

        // ═══ LAYER 3 — FOREGROUND ENTITIES ═══
        // Priority: monsters first → player on top of monsters → spells on top of player
        ctx.globalAlpha = 1;
        drawEnemies(dt);    // drawn first → at the bottom of foreground layer
        drawPlayer(dt);     // drawn second → above monsters
        // Spells (projectiles) are drawn AFTER the player in drawProjectiles below

        // ═══ LAYER 4 — SPELLS / PROJECTILES (above player) ═══
        drawProjectiles(dt);

        // ═══ LAYER 5 — EFFECTS (topmost) ═══
        drawParticles();
        drawFloatingTexts();

        // ── UPDATE LOGIC ──
        updatePlayerMovement(dt);
 
        updateProjectiles(dt);
        updateEnemies(dt);
        updateParticles(dt);
        updateFloatingTexts();

        if (s2Cooldown > 0) {
          s2Cooldown -= 16.67 * dt;
          if (s2Cooldown < 0) s2Cooldown = 0;
        }
        updateCooldownRing();
        if (player.animTimer > 0) player.animTimer -= dt;

        if (moveMarker) {
          moveMarker.life -= dt;
          if (moveMarker.life <= 0) moveMarker = null;
        }

        const walkInd = document.getElementById('walk-indicator');
        if (player.isMoving) walkInd.classList.add('visible');
        else walkInd.classList.remove('visible');

        enemySpawnTimer += 16.67 * dt;
        const nonBossCount = enemies.filter(e => e.alive && e.name !== 'BOSS').length;
        if (enemySpawnTimer >= enemySpawnInterval && nonBossCount < 3) {
          enemySpawnTimer = 0;
          spawnEnemy();
        }

        ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
      }
      requestAnimationFrame(gameLoop);
    }

    function updateProjectiles(dt) {
      for (let p of projectiles) {
        p.life -= dt;
        if (p.type === 'shockwave') {
          p.x += Math.cos(p.angle) * p.speed * dt;
          p.y += Math.sin(p.angle) * p.speed * dt;
          p.traveled += p.speed * dt;
          if (p.trailTimer > 1.5) {
            p.trailTimer = 0;
            p.trailPositions.push({ x: p.x, y: p.y, life: 20, maxLife: 20 });
            spawnParticles(p.x, p.y, p.color, 2, 2);
          }
          p.trailPositions = p.trailPositions.filter(t => t.life > 0);
          for (let t of p.trailPositions) t.life -= dt;
          for (let e of enemies) {
            if (!e.alive || p.hitIds.has(e)) continue;
            if (circleOverlapsCrescentArc(
              p.originX, p.originY, p.angle, p.traveled, e.x, e.y, e.size
            )) {
              dealDamage(e, p.damage, p.critChance);
              applyKnockback(e, p.angle, 50);
              p.hitIds.add(e);
              spawnParticles(e.x, e.y, p.color, 6, 3);
            }
          }
          if (p.traveled >= p.maxDistance ||
              p.x < -50 || p.x > GAME_W + 50 ||
              p.y < -50 || p.y > GAME_H + 50
          ) {
            spawnParticles(p.x, p.y, p.color, 15, 5);
            p.life = 0;
          }
        }
        else if (p.type === 'slash') {
          p.life -= dt;
          for (let e of enemies) {
            if (!e.alive || p.hitIds.has(e)) continue;
            const dx = e.x - p.originX, dy = e.y - p.originY;
            const dist = Math.hypot(dx, dy);
            const hitInner = p.hitInner || 5;
            const hitOuter = p.radius || 140;
            const inHitbox = p.isKnockback ?
              (dist > hitInner && dist < hitOuter) :
              pointInSweepArc(p.originX, p.originY, p.angle, 0.55, hitInner, hitOuter, e.x, e.y);
            if (inHitbox) {
              dealDamage(e, p.damage, p.critChance);
              p.hitIds.add(e);
              if (p.isKnockback) applyKnockback(e, p.knockbackDir, p.knockback);
              spawnParticles(e.x, e.y, p.color, 6, 3);
            }
          }
          if (p.life <= p.maxLife * 0.3) { p.life = 0; }
        }
        else if (p.type === 'bolt' || p.type === 'fireball' || p.type === 'arrow') {
          if (p.vx === undefined && p.vy === undefined) {
            const a = Math.atan2(p.ty - p.y, p.tx - p.x);
            p.vx = Math.cos(a) * p.speed;
            p.vy = Math.sin(a) * p.speed;
          }
          if (p.vx !== undefined) {
            p.x += p.vx*dt;
            p.y += p.vy*dt;
          }
          if (p.type === 'arrow') {
            p.angle = Math.atan2(p.vy || 0, p.vx || 1);
          }
          if (Math.random() < 0.3) spawnParticles(p.x, p.y, p.color, 1, 1);
          for (let e of enemies) {
            if (!e.alive) continue;
            const projHitRadius = (p.type === 'arrow') ? 12 : (p.type === 'bolt' ? 10 : 8);
            if (Math.hypot(p.x-e.x, p.y-e.y) < e.size + projHitRadius) {
              dealDamage(e, p.damage, p.critChance);
              spawnParticles(p.x, p.y, p.color, 8, 4);
              if (p.type !== 'fireball') { p.life = 0; }
              break;
            }
          }
          if (p.x < -100 || p.x > GAME_W+100 || p.y < -100 || p.y > GAME_H+100) p.life = 0;
          if (p.type === 'fireball' && p.life < 3) {
            for (let e of enemies) {
              if (!e.alive) continue;
              const d = Math.hypot(p.x-e.x, p.y-e.y);
              if (d < 80) dealDamage(e, p.damage*(1-d/80), p.critChance);
            }
            spawnParticles(p.x, p.y, '#e67e22', 20, 6);
            spawnParticles(p.x, p.y, '#ffd700', 10, 4);
            p.life = 0;
          }
        }
        else if (p.type === 'aoe_explosion') {
          for (let e of enemies) {
            if (!e.alive) continue;
            const d = Math.hypot(p.x-e.x, p.y-e.y);
            if (d < p.radius) dealDamage(e, p.damage*(1-d/(p.radius*2)), p.critChance);
          }
          p.life -= dt;
        }
      }
      projectiles = projectiles.filter(p => p.life > 0);
    }

 function updateEnemies(dt) {
      const now = Date.now();
      enemies = enemies.filter(e =>
        e.alive || (e.deathTime && (now - e.deathTime) < DEAD_BODY_LIFETIME)
      );
      for (let e of enemies) {
        if (!e.alive) continue;
        const dx = player.x-e.x, dy = player.y-e.y, dist = Math.hypot(dx, dy);
        if (dist > 50) {
          e.x += (dx/dist)*e.speed*dt;
          e.y += (dy/dist)*e.speed*dt;
        }
        // Clamp enemy to same depth zone as player (full playable ground area)
        const depthTop = GAME_H * DEPTH_GROUND_TOP;
        if (e.y < depthTop) e.y = depthTop;
        if (e.y > GAME_H - 10) e.y = GAME_H - 10;
        if (dist < 55) {
          e.attackTimer += dt;
          if (e.attackTimer >= e.attackCooldown) {
            e.attackTimer = 0;
            player.hp -= e.atk;
            player.hitFlash = 10;
            addLog(`💔 Took -${e.atk} damage!`, 'enemy');
            floatingTexts.push({
              x: player.x+(Math.random()-0.5)*20, y: player.y-60,
              text: '-'+e.atk, color: '#e74c3c', life:35, maxLife:35
            });
            spawnParticles(player.x, player.y-40, '#e74c3c', 5, 2);
            if (player.hp <= 0) {
              player.hp = 0;
              player.alive = false;
              showDeathScreen();
            }
            updateHUD();
          }
        }
        if (e.hitFlash > 0) e.hitFlash -= dt;
      }
    }

    function updateParticles(dt) {
      for (let p of particles) {
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.vy += 0.05*dt;
        p.life -= dt;
      }
      particles = particles.filter(p => p.life > 0);
    }
    function updateFloatingTexts(dt) {
      for (let ft of floatingTexts) {
        ft.y -= 0.8*dt;
        ft.life -= dt;
      }
      floatingTexts = floatingTexts.filter(ft => ft.life > 0);
    }

    function darkenColor(hex, factor) {
      const r = parseInt(hex.slice(1,3),16)||0;
      const g = parseInt(hex.slice(3,5),16)||0;
      const b = parseInt(hex.slice(5,7),16)||0;
      return `rgb(${Math.round(r*(1-factor))},${Math.round(g*(1-factor))},${Math.round(b*(1-factor))})`;
    }
    function getActiveEnvConfig() {
      const base = ENV_CONFIG[selectedEnv];
      const darkAmount = Math.min((wave-1)*0.08, 0.48);
      return {
        skyTop: darkenColor(base.skyTop,darkAmount),
        skyMid: darkenColor(base.skyMid,darkAmount),
        skyBot: darkenColor(base.skyBot,darkAmount),
        ground: darkenColor(base.ground,darkAmount),
        groundY: base.groundY
      };
    }

    function drawEnvironment() {
      const env = getActiveEnvConfig();
      const gY = GAME_H * env.groundY;

      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0,0,0,gY);
      skyGrad.addColorStop(0, env.skyTop);
      skyGrad.addColorStop(0.5, env.skyMid);
      skyGrad.addColorStop(1, env.skyBot);
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0,0,GAME_W,gY);

      // Horizon skyline silhouette
      drawHorizonSkyline(gY);

      // Depth perspective ground
      drawDepthGround(gY, env);
    }

    function drawHorizonSkyline(groundY) {
      ctx.save();
      const envType = selectedEnv;

      if (envType === 'forest') {
        // Tree silhouettes
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.3);
        const treeCount = 18;
        for (let i = 0; i < treeCount; i++) {
          const tx = (i / treeCount) * GAME_W + (Math.sin(i * 7.3) * 15);
          const th = 20 + Math.abs(Math.sin(i * 3.7)) * 35;
          const tw = 8 + Math.abs(Math.cos(i * 2.1)) * 10;
          ctx.beginPath();
          ctx.moveTo(tx - tw, groundY);
          ctx.lineTo(tx, groundY - th);
          ctx.lineTo(tx + tw, groundY);
          ctx.fill();
          // Trunk
          ctx.fillRect(tx - 1.5, groundY - 8, 3, 8);
        }
      } else if (envType === 'castle') {
        // Castle wall / battlement silhouettes
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.35);
        const wallWidth = 40;
        const wallCount = Math.ceil(GAME_W / wallWidth);
        for (let i = 0; i <= wallCount; i++) {
          const wx = i * wallWidth;
          const wallH = 12 + Math.abs(Math.sin(i * 5.1)) * 18;
          const hasBattlement = i % 3 !== 0;
          ctx.fillRect(wx, groundY - wallH, wallWidth - 2, wallH);
          if (hasBattlement) {
            for (let b = 0; b < 3; b++) {
              const bx = wx + b * (wallWidth / 3);
              ctx.fillRect(bx, groundY - wallH - 6, wallWidth / 3 - 4, 6);
            }
          }
          // Tower
          if (i % 5 === 0) {
            const towerH = wallH + 25 + Math.abs(Math.cos(i * 2.3)) * 15;
            ctx.fillRect(wx + wallWidth / 2 - 8, groundY - towerH, 16, towerH - wallH);
            ctx.fillRect(wx + wallWidth / 2 - 12, groundY - towerH - 4, 24, 6);
          }
        }
      } else if (envType === 'volcano') {
        // Volcanic mountain silhouettes
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.2);
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        for (let x = 0; x <= GAME_W; x += 8) {
          const y = groundY - Math.abs(Math.sin(x * 0.012)) * 50
                      - Math.abs(Math.sin(x * 0.025 + 1)) * 30
                      - Math.abs(Math.cos(x * 0.008)) * 20;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(GAME_W, groundY);
        ctx.fill();
        // Smoke puffs
        ctx.fillStyle = 'rgba(80,60,40,0.3)';
        for (let i = 0; i < 5; i++) {
          const sx = 100 + i * 150 + Math.sin(i * 4.1) * 30;
          const sy = groundY - 60 - Math.abs(Math.sin(i * 2.7)) * 40;
          ctx.beginPath();
          ctx.arc(sx, sy, 8 + Math.sin(globalTime * 0.3 + i) * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (envType === 'swamp') {
        // Dead tree silhouettes
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.25);
        const swampCount = 8;
        for (let i = 0; i < swampCount; i++) {
          const sx = 60 + i * (GAME_W / swampCount) + Math.sin(i * 6.1) * 20;
          const sh = 30 + Math.abs(Math.sin(i * 4.3)) * 40;
          // Trunk
          ctx.fillRect(sx - 2, groundY - sh, 4, sh);
          // Branches
          ctx.fillRect(sx - 20, groundY - sh + 5, 4, 3);
          ctx.fillRect(sx + 18, groundY - sh + 10, 4, 3);
          ctx.fillRect(sx - 15, groundY - sh + 15, 3, 3);
        }
        // Low fog line
        ctx.fillStyle = 'rgba(30,50,30,0.15)';
        ctx.fillRect(0, groundY - 8, GAME_W, 8);
      } else if (envType === 'beach') {
        // Distant dunes
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.15);
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        for (let x = 0; x <= GAME_W; x += 6) {
          const y = groundY - Math.abs(Math.sin(x * 0.008 + 0.5)) * 20
                      - Math.abs(Math.cos(x * 0.015)) * 10;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(GAME_W, groundY);
        ctx.fill();
      } else if (envType === 'tundra') {
        // Distant ice formations
        ctx.fillStyle = darkenColor(getActiveEnvConfig().skyBot, 0.1);
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        for (let x = 0; x <= GAME_W; x += 10) {
          const y = groundY - Math.abs(Math.sin(x * 0.015)) * 25
                      - Math.abs(Math.cos(x * 0.03 + 1)) * 15;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(GAME_W, groundY);
        ctx.fill();
        // Snow shimmer
        ctx.fillStyle = 'rgba(200,220,240,0.1)';
        for (let i = 0; i < 6; i++) {
          const sx = (i * 140 + globalTime * 20) % GAME_W;
          ctx.beginPath();
          ctx.arc(sx, groundY - 3, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawDepthGround(groundY, env) {
      const groundHeight = GAME_H - groundY;
      const bandCount = 14;
      const bandHeight = groundHeight / bandCount;

      ctx.save();

      // Draw depth bands from horizon down (far to near)
      for (let i = bandCount - 1; i >= 0; i--) {
        const bandY = groundY + i * bandHeight;
        const bandProgress = i / bandCount; // 0 = far, 1 = near

        // Darken bands as they get further from horizon
        const bandDarken = 0.3 + bandProgress * 0.7;
        const darkerGround = darkenColor(env.ground, bandDarken * 0.15);

        // Alternate subtle shading for depth illusion
        const shade = (i % 2 === 0) ? darkenColor(darkerGround, 0.04) : darkerGround;
        ctx.fillStyle = shade;
        ctx.fillRect(0, bandY, GAME_W, bandHeight + 0.5);

        // Horizontal band lines for depth
        if (i > 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
          ctx.fillRect(0, bandY, GAME_W, 0.5);
        }
      }

      // Horizon highlight line
      const horizonGrad = ctx.createLinearGradient(0, groundY - 4, 0, groundY + 8);
      horizonGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
      horizonGrad.addColorStop(0.4, 'rgba(255,255,255,0.08)');
      horizonGrad.addColorStop(1, 'rgba(0,0,0,0.25)');
      ctx.fillStyle = horizonGrad;
      ctx.fillRect(0, groundY - 4, GAME_W, 12);

      // Near-ground brightening for foreground depth
      const nearBandCount = 3;
      const nearBandHeight = bandHeight * nearBandCount;
      const nearGrad = ctx.createLinearGradient(0, GAME_H - nearBandHeight, 0, GAME_H);
      nearGrad.addColorStop(0, 'rgba(255,255,255,0.01)');
      nearGrad.addColorStop(1, 'rgba(255,255,255,0.05)');
      ctx.fillStyle = nearGrad;
      ctx.fillRect(0, GAME_H - nearBandHeight, GAME_W, nearBandHeight);

      ctx.restore();
    }

    function drawBiomeGroundDecoration(groundY) {
      const envType = selectedEnv;

      if (envType === 'forest') {
        drawForestGroundGrass(groundY);
      } else if (envType === 'volcano') {
        drawVolcanoGroundRocks(groundY);
      } else if (envType === 'castle') {
        drawCastleGroundDetails(groundY);
      } else if (envType === 'swamp') {
        drawSwampGroundMud(groundY);
      }
    }

    function drawForestGroundGrass(groundY) {
      ctx.save();
      const grassCount = 30;
      for (let i = 0; i < grassCount; i++) {
        const gx = (i / grassCount) * GAME_W + Math.sin(i * 3.7) * 10;
        const gy = groundY + 8 + Math.abs(Math.sin(i * 2.3)) * 40;
        const grassSize = 6 + Math.abs(Math.cos(i * 1.5)) * 8;
        const sway = Math.sin(globalTime * 2.0 + i * 0.8) * 0.15;

        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(sway);

        // Individual grass blades
        for (let b = 0; b < 3; b++) {
          const bladeOffset = (b - 1) * 3;
          const bladeHeight = grassSize * (0.7 + Math.random() * 0.3);
          const bladeAngle = sway * (b - 1) * 0.3;
          ctx.save();
          ctx.translate(bladeOffset, 0);
          ctx.rotate(bladeAngle);
          ctx.fillStyle = `hsla(${110 + i * 3}, 50%, ${25 + Math.sin(i + globalTime) * 8}%, 0.5)`;
          ctx.beginPath();
          ctx.moveTo(-1.5, 0);
          ctx.quadraticCurveTo(-2, -bladeHeight * 0.5, -1, -bladeHeight);
          ctx.quadraticCurveTo(0, -bladeHeight * 0.8, 1, -bladeHeight);
          ctx.quadraticCurveTo(2, -bladeHeight * 0.5, 1.5, 0);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function drawVolcanoGroundRocks(groundY) {
      ctx.save();
      const rockCount = 25;
      for (let i = 0; i < rockCount; i++) {
        const rx = (i / rockCount) * GAME_W + Math.sin(i * 5.1) * 12;
        const ry = groundY + 10 + Math.abs(Math.sin(i * 3.2)) * 50;
        const rw = 10 + Math.abs(Math.cos(i * 2.7)) * 18;
        const rh = 4 + Math.abs(Math.sin(i * 1.9)) * 8;

        // Dark volcanic rock
        ctx.fillStyle = `rgb(${30 + Math.sin(i * 4.3) * 15}, ${18 + Math.sin(i * 2.9) * 10}, ${12 + Math.sin(i * 1.3) * 8})`;
        ctx.beginPath();
        ctx.moveTo(rx - rw / 2, ry);
        ctx.lineTo(rx - rw / 2 + rw * 0.15, ry - rh);
        ctx.lineTo(rx + rw * 0.2, ry - rh * 1.3);
        ctx.lineTo(rx + rw / 2, ry - rh * 0.3);
        ctx.lineTo(rx + rw / 2 + rw * 0.1, ry);
        ctx.fill();

        // Occasional ember glow
        if (Math.sin(i * 7.3 + globalTime * 0.5) > 0.85) {
          ctx.fillStyle = `rgba(255, 60, 0, ${0.15 + Math.sin(globalTime * 2 + i) * 0.1})`;
          ctx.beginPath();
          ctx.arc(rx + Math.sin(i) * 3, ry - rh * 0.5, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawCastleGroundDetails(groundY) {
      ctx.save();
      // Stone floor pattern
      ctx.strokeStyle = 'rgba(100,100,120,0.15)';
      ctx.lineWidth = 0.5;
      const stoneW = 30;
      const stoneH = 15;
      for (let row = 0; row < 6; row++) {
        const sy = groundY + 5 + row * stoneH;
        const offset = (row % 2) * (stoneW / 2);
        for (let col = -1; col < GAME_W / stoneW + 1; col++) {
          const sx = col * stoneW + offset;
          ctx.strokeRect(sx, sy, stoneW, stoneH);
        }
      }

      // Sparse vegetation
      const plantCount = 10;
      for (let i = 0; i < plantCount; i++) {
        const px = 50 + (i / plantCount) * GAME_W + Math.sin(i * 4.7) * 15;
        const py = groundY + 12 + Math.abs(Math.sin(i * 2.5)) * 45;
        const plantH = 8 + Math.abs(Math.cos(i * 3.1)) * 6;

        ctx.strokeStyle = 'rgba(74,124,89,0.4)';
        ctx.lineWidth = 1.5;
        const sway = Math.sin(globalTime * 1.2 + i) * 0.1;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(sway);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-3, -plantH * 0.5, -2, -plantH);
        ctx.stroke();
        ctx.restore();

        // Small flower
        if (i % 3 === 0) {
          const flowerColors = ['#ff6b6b', '#ffd93d', '#a8d8ea'];
          ctx.fillStyle = flowerColors[i % 3];
          ctx.globalAlpha = 0.4;
          ctx.beginPath();
          ctx.arc(px + Math.sin(globalTime * 1.2 + i) * 2, py - plantH, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
      ctx.restore();
    }

    function drawSwampGroundMud(groundY) {
      ctx.save();
      // Mud puddle patches
      const puddleCount = 15;
      for (let i = 0; i < puddleCount; i++) {
        const px = (i / puddleCount) * GAME_W + Math.sin(i * 3.3) * 20;
        const py = groundY + 8 + Math.abs(Math.sin(i * 2.1)) * 50;
        const pw = 12 + Math.abs(Math.cos(i * 1.7)) * 15;
        const ph = 4 + Math.abs(Math.sin(i * 4.5)) * 4;

        ctx.fillStyle = `rgba(40, 35, 30, ${0.15 + Math.sin(i * 2.3) * 0.05})`;
        ctx.beginPath();
        ctx.ellipse(px, py, pw, ph, 0, 0, Math.PI * 2);
        ctx.fill();

        // Bubble effect
        if (Math.sin(globalTime * 2.5 + i * 7.1) > 0.9) {
          const bx = px + Math.sin(globalTime + i) * pw * 0.5;
          const by = py - Math.abs(Math.sin(globalTime * 1.8)) * 5;
          ctx.fillStyle = 'rgba(160, 210, 120, 0.35)';
          ctx.beginPath();
          ctx.arc(bx, by, 1.5 + Math.sin(globalTime * 3 + i) * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Wet sheen across ground
      ctx.fillStyle = 'rgba(60, 70, 55, 0.06)';
      ctx.fillRect(0, groundY + 3, GAME_W, 60);
      ctx.restore();
    }

    function drawBackgroundParticles(dt) {
      const groundY = getGroundY();
      for (let p of bgParticles) {
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        if (p.y > groundY - 5) {
          p.y = 10 + Math.random() * (groundY - 30);
          p.x = Math.random()*GAME_W;
        }
        if (p.x < -10) p.x = GAME_W+10;
        if (p.x > GAME_W+10) p.x = -10;
        ctx.fillStyle = `rgba(255,255,255,${p.alpha*0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
      }
    }

          ctx.globalAlpha = 0.35 * fadeOut;
        } else {
          ctx.globalAlpha = 1;
          if (e.hitFlash > 0) ctx.globalAlpha *= 0.5 + Math.sin(e.hitFlash*3)*0.5;
        }
        const groundY = getGroundY();

        /* ─── DEPTH-AWARE SHADOW ─── */
        const eDepth = Math.max(0, Math.min(1, (e.y - groundY) / (GAME_H - groundY)));
        const eShadowAlpha = 0.15 + eDepth * 0.2;
        const eShadowW = e.size * 0.7 + eDepth * e.size * 0.3;
        const eShadowH = e.size * 0.2 + eDepth * e.size * 0.15;
        ctx.fillStyle = `rgba(0,0,0,${eShadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(e.x, groundY, eShadowW, eShadowH, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#e74c3c';
        ctx.beginPath();
        ctx.arc(e.x-6, e.y-4, 3, 0, Math.PI*2);
        ctx.arc(e.x+6, e.y-4, 3, 0, Math.PI*2);
        ctx.fill();

        ctx.font = `${e.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.icon, e.x, e.y);
        ctx.textBaseline = 'alphabetic';

        const displayHp = e.alive ? e.hp : 0;
        const hpRatio = Math.max(0, displayHp / e.maxHp);
        const barW = e.size*2, barH = 4, barX = e.x-barW/2, barY = e.y-e.size-12;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(barX-1, barY-1, barW+2, barH+2);
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(barX, barY, barW * hpRatio, barH);
        ctx.font = '9px sans-serif';
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'center';
        ctx.fillText(`${e.name}${e.name==='BOSS'?' 👑':''} Lv.${Math.ceil(wave)}`, e.x, barY-4);

        ctx.globalAlpha = 1;
      }
    }

    function drawProjectiles(dt) {
      for (let p of projectiles) {
        const alpha = Math.min(1, p.life/(p.maxLife*0.3));
        ctx.globalAlpha = alpha;
        if (p.type === 'shockwave') {
          const rot = p.angle;
          const a1 = Math.PI / 4;
          const a2 = Math.PI * 1.75;
          const rx = 90; const ry = 30;
          const irx = rx * 0.75; const iry = ry * 0.75;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(rot + Math.PI);
          ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, a1, a2);
          ctx.strokeStyle = p.color; ctx.lineWidth = 7;
          ctx.shadowColor = p.color; ctx.shadowBlur = 18; ctx.stroke();
          ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, a1, a2);
          ctx.lineTo(irx * Math.cos(a2), iry * Math.sin(a2));
          ctx.ellipse(0, 0, irx, iry, 0, a2, a1, true); ctx.closePath();
          ctx.fillStyle = p.color;
          ctx.globalAlpha = alpha * 0.35; ctx.fill();
          ctx.beginPath(); ctx.ellipse(0, 0, irx, iry, 0, a1 + 0.1, a2 - 0.1);
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
          ctx.shadowBlur = 8; ctx.globalAlpha = alpha; ctx.stroke();
          ctx.shadowBlur = 0; ctx.globalAlpha = 1; ctx.restore();
          for (let i = 0; i < p.trailPositions.length; i++) {
            const tp = p.trailPositions[i];
            const progress = tp.life / tp.maxLife;
            ctx.globalAlpha = progress * 0.2;
            ctx.save(); ctx.translate(tp.x, tp.y); ctx.rotate(rot + Math.PI);
            ctx.beginPath(); ctx.ellipse(0, 0, rx * progress, ry * progress, 0, a1, a2);
            ctx.strokeStyle = p.color; ctx.lineWidth = 3 * progress; ctx.stroke();
            ctx.restore();
          }
          ctx.globalAlpha = alpha;
        }
        else if (p.type === 'slash') {
          const arcRadius = p.radius || 70;
          const progress = 1 - (p.life / p.maxLife);
          const sweepAngle = progress * Math.PI * 0.7;
          ctx.strokeStyle = p.color; ctx.lineWidth = 3;
          ctx.shadowColor = p.color; ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.originX, p.originY, arcRadius,
            p.angle - sweepAngle*0.5, p.angle + sweepAngle*0.5);
          ctx.stroke();
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
          ctx.globalAlpha = alpha*0.5; ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(p.originX, p.originY, arcRadius-8,
            p.angle - sweepAngle*0.3, p.angle + sweepAngle*0.3);
          ctx.stroke();
          ctx.fillStyle = '#fff'; ctx.shadowBlur = 5;
          const ep1X = p.originX+Math.cos(p.angle-sweepAngle*0.5)*arcRadius;
          const ep1Y = p.originY+Math.sin(p.angle-sweepAngle*0.5)*arcRadius;
          const ep2X = p.originX+Math.cos(p.angle+sweepAngle*0.5)*arcRadius;
          const ep2Y = p.originY+Math.sin(p.angle+sweepAngle*0.5)*arcRadius;
          ctx.beginPath(); ctx.arc(ep1X, ep1Y, 3, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(ep2X, ep2Y, 3, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 0;
        }
        else if (p.type === 'fireball') {
          const grad = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, 15);
          grad.addColorStop(0, '#fff');
          grad.addColorStop(0.3, p.color);
          grad.addColorStop(1, 'rgba(230,126,34,0)');
          ctx.fillStyle = grad; ctx.beginPath();
          ctx.arc(p.x, p.y, 15, 0, Math.PI*2); ctx.fill();
          if (p.life < 3) {
            for (let e of enemies) {
              if (!e.alive) continue;
              const d = Math.hypot(p.x-e.x, p.y-e.y);
              if (d < 80) dealDamage(e, p.damage*(1-d/80), p.critChance);
            }
            spawnParticles(p.x, p.y, '#e67e22', 20, 6);
            spawnParticles(p.x, p.y, '#ffd700', 10, 4);
            p.life = 0;
          }
        }
        else if (p.type === 'bolt') {
          ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
          const t = Date.now()/100;
          ctx.beginPath(); ctx.moveTo(p.x-3, p.y); ctx.lineTo(p.x+3, p.y); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(p.x, p.y-3); ctx.lineTo(p.x, p.y+3); ctx.stroke();
          ctx.shadowBlur = 0;
        }
        else if (p.type === 'arrow') {
          const a = p.angle || Math.atan2(p.vy || 0, p.vx || 1);
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(a);
          ctx.fillStyle = '#a07828'; ctx.fillRect(-12, -1.5, 24, 3);
          ctx.fillStyle = '#888'; ctx.beginPath();
          ctx.moveTo(14, 0); ctx.lineTo(7, -4); ctx.lineTo(7, 4);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = p.color; ctx.beginPath();
          ctx.moveTo(-12, -1.5); ctx.lineTo(-16, -5);
          ctx.lineTo(-10, -1.5); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-12, 1.5); ctx.lineTo(-16, 5);
          ctx.lineTo(-10, 1.5); ctx.closePath(); ctx.fill();
          ctx.shadowColor = p.color; ctx.shadowBlur = 8;
          ctx.fillStyle = p.color;
          ctx.globalAlpha = alpha * 0.5;
          ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = alpha; ctx.shadowBlur = 0;
          ctx.restore();
        }
        else if (p.type === 'aoe_explosion') {
          const progress = 1 - p.life/p.maxLife;
          ctx.strokeStyle = p.color; ctx.lineWidth = 4*(1-progress);
          ctx.beginPath();
          ctx.arc(p.x, p.y-40, progress*p.radius, 0, Math.PI*2); ctx.stroke();
          ctx.fillStyle = `rgba(255,215,0,${alpha*0.2*(1-progress)})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y-40, progress*p.radius, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.globalAlpha = p.life/p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*(p.life/p.maxLife), 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    function drawFloatingTexts() {
      for (let ft of floatingTexts) {
        ctx.globalAlpha = ft.life/ft.maxLife;
        ctx.font = `bold ${ft.isCrit?18:14}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = '#000';
        ctx.fillText(ft.text, ft.x+1, ft.y+1);
        ctx.fillStyle = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y);
      }
      ctx.globalAlpha = 1;
    }

    function initBgParticles() {
      bgParticles = [];
      const groundY = getGroundY();
      for (let i = 0; i < 40; i++) {
        bgParticles.push({
          x: Math.random()*GAME_W,
          y: 10 + Math.random() * (groundY - 30),
          vx: (Math.random()-0.5)*0.5,
          vy: -Math.random()*0.8-0.2,
          size: Math.random()*2+1,
          alpha: Math.random()*0.5+0.2
        });
      }
    }
    function spawnParticles(x, y, color, count, speed) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random()*Math.PI*2;
        const spd = (0.5+Math.random())*speed;
        particles.push({
          x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd-1,
          life: 20+Math.floor(Math.random()*20), maxLife: 40, color,
          size: 1.5+Math.random()*3
        });
      }
    }
    function updateHUD() {
      const pct = Math.max(0, (player.hp/player.maxHp)*100);
      document.getElementById('hp-bar').style.width = pct+'%';
      document.getElementById('hp-text').textContent = `HP: ${player.hp} / ${player.maxHp}`;
    }
    function updateScore() {
      document.getElementById('kill-count').textContent = kills;
      document.getElementById('wave-count').textContent = wave;
    }
    function updateCooldownRing() {
      const c = document.getElementById('cd-circle');
      const t = document.getElementById('cd-text');
      const circ = 2*Math.PI*26;
      if (s2Cooldown > 0) {
        const p = s2Cooldown/s2MaxCooldown;
        c.style.strokeDasharray = circ;
        c.style.strokeDashoffset = circ*p;
        t.textContent = (s2Cooldown/1000).toFixed(1);
      } else {
        c.style.strokeDashoffset = 0;
        t.textContent = '✓';
      }
    }
    function showKillPopup(x, y) {
      const p = document.createElement('div');
      p.className = 'kill-popup';
      p.textContent = '💀 +1';
      p.style.left = (x/GAME_W*100)+'%';
      p.style.top = (y/GAME_H*100)+'%';
      document.querySelector('.main-area').appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
    function addLog(text, type = 'player') {
      recentLogs.unshift({ text, type, time: Date.now() });
      if (recentLogs.length > MAX_LOGS) recentLogs.pop();
      updateCompactLog();
    }
    function updateCompactLog() {
      const d = document.getElementById('log-display');
      if (recentLogs.length === 0) {
        d.textContent = 'Waiting for action...';
        d.className = 'log-content';
      } else {
        const l = recentLogs[0];
        d.textContent = l.text;
        d.className = `log-content ${l.type}`;
      }
    }

    updateClassCarousel();
    updateHUD();
    updateCompactLog();
  </script>
</body>
</html>
